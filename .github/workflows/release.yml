name: Release

# Publishes @narai/credential-providers to npm whenever a tag matching vX.Y.Z is
# pushed. The package.json version is cross-checked against the tag so we
# never publish a mismatched version.
#
# Setup required ONCE per package on npmjs.com:
#   Configure a Trusted Publisher pointing at this repo + workflow.
#   No stored token — GitHub Actions authenticates to npm via OIDC per publish,
#   gated by the `id-token: write` permission below.
#
# Release workflow:
#   - bump version in package.json (e.g. npm version patch)
#   - commit + push
#   - tag: git tag v0.1.1 && git push origin v0.1.1
#   - this workflow fires, builds, tests, and publishes
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub release
      id-token: write   # needed for npm provenance attestations
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          set -e
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME => version $TAG_VERSION, but package.json has $PKG_VERSION"
            exit 1
          fi
          echo "Publishing v$PKG_VERSION"

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
